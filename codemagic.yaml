workflows:
  ios-android-workflow:
    name: Vinos Barbers Build
    max_build_duration: 30

    environment:
      flutter: stable

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk